<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Load fonts WITHOUT blocking the first paint: a render-blocking stylesheet
         would leave the viewport white until the font CSS arrives (worst on a hard
         refresh). preload + swap-to-stylesheet onload keeps the dark loader instant. -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;500;600&display=swap"></noscript>
    <title>Drew Bermudez</title>
    <!-- Lightbulb-with-database-filament mark. PNG first so legacy browsers use
         it; SVG-aware browsers prefer the type=image/svg+xml entry. -->
    <link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <meta name="theme-color" content="#06070b">
    <!-- Critical paint: own the dark background + loading line before the JS bundle
         (which carries the real CSS) lands, so the first frame is dark — never white.
         The loader overlay covers the page while fonts load and the swarm warms up,
         then App fades it out as one piece — see useRevealOnReady. -->
    <style>
      html, body { margin: 0; background: #06070b; }

      #loader {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #06070b;
        transition: opacity 0.6s ease;
      }
      #loader.hidden { opacity: 0; pointer-events: none; }
      #loader .line {
        position: relative;
        width: 140px;
        height: 2px;
        border-radius: 2px;
        background: rgba(255, 255, 255, 0.08);
        overflow: hidden;
      }
      #loader .line::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        width: 40%;
        border-radius: inherit;
        background: #35e0ff;
        animation: loader-slide 1.1s ease-in-out infinite;
      }
      @keyframes loader-slide {
        0%   { left: -40%; }
        100% { left: 100%; }
      }
      @media (prefers-reduced-motion: reduce) {
        #loader { transition: none; }
        #loader .line::after { animation: none; left: 30%; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="loader"><div class="line"></div></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
